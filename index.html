const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function fmtDate(from, to) {
  if (!from) return '';
  const d1 = new Date(from + 'T12:00:00');
  const f = d => `${d.getDate()} ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}`;
  if (!to || from === to) return f(d1);
  const d2 = new Date(to + 'T12:00:00');
  if (d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth()) {
    return `${d1.getDate()}–${d2.getDate()} ${MONTHS_GEN[d1.getMonth()]} ${d1.getFullYear()}`;
  }
  return `${f(d1)} — ${f(d2)}`;
}

function renderCalendar(prefix) {
  const yr = modal.calYear, mo = modal.calMonth;
  const firstDow = (new Date(yr, mo, 1).getDay() + 6) % 7;
  const days = new Date(yr, mo + 1, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);
  const from = modal.dateFrom, to = modal.dateTo;
  const iso = d => `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let cells = DAYS_SHORT.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= days; d++) {
    const dt = iso(d);
    const isFrom = dt === from, isTo = dt === to;
    const isSel = isFrom || isTo;
    const inRange = from && to && from !== to && dt > from && dt < to;
    const isRange = from && to && from !== to;
    let cls = 'cal-day';
    if (dt === today) cls += ' today';
    if (isSel) cls += ' sel' + (isRange ? (isFrom ? ' range-start' : ' range-end') : ' single');
    if (inRange) cls += ' in-range';
    cells += `<button class="${cls}" onclick="${prefix}_pickDate('${dt}')">${d}</button>`;
  }

  const sel = fmtDate(from, to);
  return `<div class="cal">
    <div class="cal-header">
      <button class="cal-nav" onclick="${prefix}_calNav(-1)">‹</button>
      <span class="cal-month">${MONTHS_RU[mo]} ${yr}</span>
      <button class="cal-nav" onclick="${prefix}_calNav(1)">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${sel
      ? `<div class="cal-info"><span>📅 ${sel}</span><button class="cal-clear" onclick="${prefix}_clearDate()">✕ Очистить</button></div>`
      : `<div class="cal-info"><span style="color:#d1d5db">Выберите дату или диапазон</span></div>`}
  </div>`;
}

      { id:"emma-english", text:"Английский для Эммы перед школой", note:"2–3 онлайн-занятия в неделю снизят стресс в первый день.", priority:"medium", date:"Июль–август", strategy:"optimize", strategyNote:"Минимум усилий — максимум уверенности." },
      { id:"explore", text:"Найти любимые места в районе", note:"LENA Specialty Coffee, Time Out Market, набережная.", priority:"low", date:"Август", strategy:"skip", strategyNote:"Произойдёт само — просто гулять." },
    ]},
  ]},
];

// State
let phases = DEFAULT_PHASES;
let checked = {};
let activePhase = "march";
let expandedNote = null;
let expandedStrat = null;
let modal = null; // {type: 'edit'|'add', ...}
let dbStatus = "synced";
let lastHash = null;
let saving = false;

// DB
async function dbLoad() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/plan_data?id=eq.main&select=phases,checked,updated_at`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const rows = await res.json();
  return rows && rows.length > 0 ? rows[0] : null;
}

async function dbSave(p, c) {
  if (saving) return;
  saving = true;
  dbStatus = "saving"; render();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/plan_data`, {
      method: "POST",
      headers: { "Content-Type":"application/json", apikey: SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, Prefer:"resolution=merge-duplicates" },
      body: JSON.stringify({ id:"main", phases:p, checked:c })
    });
    dbStatus = "synced";
  } catch(e) { dbStatus = "error"; }
  saving = false;
  render();
}

async function poll() {
  if (saving) return;
  try {
    const row = await dbLoad();
    if (!row) return;
    const h = JSON.stringify({phases: row.phases, checked: row.checked});
    if (h !== lastHash) {
      lastHash = h;
      if (row.phases) phases = row.phases;
      if (row.checked) checked = row.checked;
      dbStatus = "synced";
      render();
    }
  } catch(e) {}
}

function applyAndSave(newPhases, newChecked) {
  phases = newPhases;
  checked = newChecked || checked;
  lastHash = JSON.stringify({phases, checked});
  render();
  dbSave(phases, checked);
}

// Actions
function toggle(id) {
  const nc = {...checked, [id]: !checked[id]};
  applyAndSave(phases, nc);
}

function updateTask(phaseId, weekId, taskId, updates) {
  const np = phases.map(p => p.id!==phaseId?p:{...p,weeks:p.weeks.map(w=>w.id!==weekId?w:{...w,tasks:w.tasks.map(t=>t.id!==taskId?t:{...t,...updates})})});
  applyAndSave(np);
  modal = null; render();
}

function deleteTask(phaseId, weekId, taskId) {
  const np = phases.map(p => p.id!==phaseId?p:{...p,weeks:p.weeks.map(w=>w.id!==weekId?w:{...w,tasks:w.tasks.filter(t=>t.id!==taskId)})});
  applyAndSave(np);
  modal = null; render();
}

function moveTask(fromPhaseId, fromWeekId, taskId, toPhaseId, toWeekId, updates) {
  let moved = null;
  let np = phases.map(p => p.id!==fromPhaseId?p:{...p,weeks:p.weeks.map(w=>w.id!==fromWeekId?w:{...w,tasks:w.tasks.filter(t=>{if(t.id!==taskId)return true;moved={...t,...updates};return false;})})});
  if(!moved)return;
  np = np.map(p => p.id!==toPhaseId?p:{...p,weeks:p.weeks.map(w=>w.id!==toWeekId?w:{...w,tasks:[...w.tasks,moved]})});
  applyAndSave(np);
  modal = null; render();
}

function addTask(phaseId, weekId, task) {
  const np = phases.map(p => p.id!==phaseId?p:{...p,weeks:p.weeks.map(w=>w.id!==weekId?w:{...w,tasks:[...w.tasks,{id:genId(),...task}]})});
  applyAndSave(np);
  modal = null; render();
}

// Drag
let dragFrom = null;
function dragStart(phaseId, weekId, idx) { dragFrom = {phaseId,weekId,idx}; }
function dragOver(e) { e.preventDefault(); }
function dragDrop(phaseId, weekId, idx) {
  if(!dragFrom||dragFrom.phaseId!==phaseId||dragFrom.weekId!==weekId||dragFrom.idx===idx)return;
  const np = phases.map(p=>p.id!==phaseId?p:{...p,weeks:p.weeks.map(w=>{
    if(w.id!==weekId)return w;
    const tasks=[...w.tasks];
    const[moved]=tasks.splice(dragFrom.idx,1);
    tasks.splice(idx,0,moved);
    return{...w,tasks};
  })});
  dragFrom=null;
  applyAndSave(np);
}

// Render helpers
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderStratChips(current, prefix) {
  return Object.entries(STRATEGY).map(([key,val])=>`
    <button class="chip" style="background:${current===key?val.bg:'#f3f4f6'};color:${current===key?val.color:'#6b7280'};font-weight:${current===key?700:400}"
      onclick="${prefix}_setStrat('${key}')">${val.icon} ${val.label}</button>
  `).join('');
}

function renderPriorityChips(current, prefix) {
  return Object.entries(PRIORITY).map(([key,val])=>`
    <button class="chip" style="flex:1;padding:7px;border-radius:8px;background:${current===key?val.bg:'#f3f4f6'};color:${current===key?val.text:'#6b7280'};font-weight:${current===key?700:400}"
      onclick="${prefix}_setPriority('${key}')">${val.label}</button>
  `).join('');
}

function renderModal() {
  if (!modal) return '';
  if (modal.type === 'edit') {
    const ph = phases.find(p=>p.id===modal.phaseId);
    const wk = ph?.weeks.find(w=>w.id===modal.weekId);
    const toPhase = phases.find(p=>p.id===(modal.movePhase||modal.phaseId));
    const showMove = modal.movePhase !== modal.phaseId || modal.moveWeek !== modal.weekId;
    return `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">РЕДАКТИРОВАТЬ ЗАДАЧУ</div>
        <input class="modal-input" id="edit-text" value="${esc(modal.text)}" placeholder="Название *">
        <textarea class="modal-textarea" id="edit-note" placeholder="Детали">${esc(modal.note)}</textarea>
        <div class="modal-label">ДАТА / СРОК</div>
        ${renderCalendar('edit')}
        <div class="modal-label">СТРАТЕГИЯ</div>
        <div class="chips">${renderStratChips(modal.strat,'edit')}</div>
        <input class="modal-input" id="edit-stratNote" value="${esc(modal.stratNote)}" placeholder="Почему такая стратегия?">
        <div class="modal-label" style="margin-top:4px">ПРИОРИТЕТ</div>
        <div style="display:flex;gap:6px;margin-bottom:16px">${renderPriorityChips(modal.priority,'edit')}</div>
        <div class="modal-label">ПЕРЕНЕСТИ В ДРУГОЙ БЛОК</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <select class="modal-select" id="edit-toPhase" onchange="editChangePhase(this.value)">
            ${phases.map(p=>`<option value="${p.id}"${p.id===modal.movePhase?' selected':''}>${p.label}</option>`).join('')}
          </select>
          <select class="modal-select" id="edit-toWeek">
            ${(toPhase?.weeks||[]).map(w=>`<option value="${w.id}"${w.id===modal.moveWeek?' selected':''}>${w.week}</option>`).join('')}
          </select>
        </div>
        ${showMove?`<button class="btn-move" onclick="doMove()">→ Перенести задачу</button>`:''}
        <div class="btn-row">
          <button class="btn-primary" style="background:#1a1a2e;flex:1" onclick="doSave()">Сохранить</button>
          <button class="btn-delete" onclick="doDelete()">🗑</button>
        </div>
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      </div>
    </div>`;
  }
  if (modal.type === 'add') {
    return `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">НОВАЯ ЗАДАЧА</div>
        <input class="modal-input" id="add-text" placeholder="Название *" autofocus>
        <textarea class="modal-textarea" id="add-note" placeholder="Детали (необязательно)"></textarea>
        <div class="modal-label">ДАТА / СРОК</div>
        ${renderCalendar('add')}
        <div class="modal-label">СТРАТЕГИЯ</div>
        <div class="chips">${renderStratChips(modal.strat,'add')}</div>
        <div class="modal-label">ПРИОРИТЕТ</div>
        <div style="display:flex;gap:6px;margin-bottom:16px">${renderPriorityChips(modal.priority,'add')}</div>
        <button class="btn-primary" id="add-submit" style="background:#1a1a2e;opacity:0.4" onclick="doAdd()">Добавить задачу</button>
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      </div>
    </div>`;
  }
  return '';
}

function render() {
  const total = phases.flatMap(p=>p.weeks.flatMap(w=>w.tasks)).length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const ph = phases.find(p=>p.id===activePhase);

  const statusMap = {
    loading:{color:"#94a3b8",label:"⟳ загрузка"},
    saving:{color:"#60a5fa",label:"⟳ сохранение"},
    synced:{color:"#22c55e",label:"● синхр."},
    error:{color:"#f87171",label:"⚠ ошибка"},
  };
  const st = statusMap[dbStatus];

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-sub">Семья Станчевых</div>
        <h1>Переезд в Лиссабон</h1>
        <div class="header-date">Март — Сентябрь 2026</div>
      </div>
      <div class="sync-status">
        <div style="color:${st.color}">${st.label}</div>
        <div style="font-size:8px;color:#334155;margin-top:1px">обновл. каждые 5с</div>
      </div>
    </div>
    <div class="progress-label"><span>Прогресс</span><span style="color:#fff;font-weight:700">${done}/${total} · ${pct}%</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  </div>

  <div class="legend">
    ${Object.entries(STRATEGY).map(([k,v])=>`<span class="legend-item" style="background:${v.bg};color:${v.color}">${v.icon} ${v.label}</span>`).join('')}
  </div>

  <div class="tabs">
    ${phases.map(p=>{
      const all=p.weeks.flatMap(w=>w.tasks);
      const d=all.filter(t=>checked[t.id]).length;
      const isActive=p.id===activePhase;
      return `<button class="tab${isActive?' active':''}" style="${isActive?`color:${p.color};border-bottom-color:${p.color}`:''}" onclick="setPhase('${p.id}')">
        ${p.label}<span class="tab-badge${d===all.length&&all.length>0?' done':''}">${d}/${all.length}</span>
      </button>`;
    }).join('')}
  </div>

  <div class="content">
    <div><span class="phase-label" style="background:${ph.color}">${ph.sublabel}</span></div>
    <div class="phase-title">${ph.label}</div>
    ${ph.weeks.map(week=>`
      <div class="week">
        <div class="week-label">${week.week}</div>
        <div class="tasks">
          ${week.tasks.map((task,idx)=>{
            const isDone=checked[task.id];
            const isSkip=task.strategy==='skip';
            const strat=STRATEGY[task.strategy]||STRATEGY.required;
            const noteOpen=expandedNote===task.id;
            const stratOpen=expandedStrat===task.id;
            return `
            <div class="task-card${isDone?' done':''}${isSkip?' skipped':''}"
              draggable="true"
              ondragstart="dragStart('${ph.id}','${week.id}',${idx})"
              ondragover="dragOver(event)"
              ondrop="dragDrop('${ph.id}','${week.id}',${idx})">
              <div class="task-row">
                <div class="checkbox${isDone?' checked':''}" style="${isDone?`background:${ph.color}`:''}${isSkip?';border-color:#e5e7eb':''}"
                  ${isSkip?'':`data-toggle="${task.id}"`}>
                  ${isDone?`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
                  ${isSkip&&!isDone?`<span style="font-size:10px;color:#d1d5db">⊘</span>`:''}
                </div>
                <div class="task-body">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
                    <span class="task-title${isDone||isSkip?' done':''}">${esc(task.text)}</span>
                    <button class="task-more" onclick="openEdit('${ph.id}','${week.id}','${task.id}')">···</button>
                  </div>
                  <div class="task-meta">
                    <span class="strat-badge" style="background:${strat.bg};color:${strat.color}">${strat.icon} ${strat.label}</span>
                    ${task.dateFrom?`<span class="task-date">📅 ${fmtDate(task.dateFrom,task.dateTo)}</span>`:task.date?`<span class="task-date">📅 ${esc(task.date)}</span>`:''}
                  </div>
                  ${(task.note||task.strategyNote)?`<div class="task-links">
                    ${task.note?`<button class="task-link" onclick="toggleNote('${task.id}')">${noteOpen?'▾ Скрыть':'▸ Детали'}</button>`:''}
                    ${task.strategyNote?`<button class="task-link" style="color:${strat.color}" onclick="toggleStrat('${task.id}')">${stratOpen?'▾ Скрыть':'▸ Почему?'}</button>`:''}
                  </div>`:''}
                  ${noteOpen&&task.note?`<div class="task-note" style="border-left-color:${ph.color}">${esc(task.note)}</div>`:''}
                  ${stratOpen&&task.strategyNote?`<div class="strat-note" style="background:${strat.bg};color:${strat.color}">${strat.icon} ${esc(task.strategyNote)}</div>`:''}
                </div>
              </div>
            </div>`;
          }).join('')}
          <button class="add-task-btn" onclick="openAdd('${ph.id}','${week.id}')">+ Добавить задачу</button>
        </div>
      </div>
    `).join('')}
  </div>

  <div class="footer">SERGII · ANNA · EMMA · LISBON 2026 · Supabase sync</div>
  ${renderModal()}
  `;

  document.getElementById('app').innerHTML = html;

  // After render, wire up add input listener
  const addText = document.getElementById('add-text');
  if (addText) {
    addText.addEventListener('input', e => {
      const btn = document.getElementById('add-submit');
      if(btn) btn.style.opacity = e.target.value.trim() ? '1' : '0.4';
    });
    setTimeout(()=>addText.focus(),100);
  }
}

// Modal state mutators (called from inline onclick)
window.edit_setStrat = s => { modal.strat=s; render(); };
window.edit_setPriority = s => { modal.priority=s; render(); };
window.add_setStrat = s => { modal.strat=s; render(); };
window.add_setPriority = s => { modal.priority=s; render(); };

function calPickDate(iso) {
  if (!modal.dateFrom || (modal.dateFrom && modal.dateTo)) {
    modal.dateFrom = iso; modal.dateTo = null;
  } else if (iso === modal.dateFrom) {
    modal.dateTo = iso;
  } else if (iso < modal.dateFrom) {
    modal.dateTo = modal.dateFrom; modal.dateFrom = iso;
  } else {
    modal.dateTo = iso;
  }
  render();
}
function calNav(dir) {
  modal.calMonth += dir;
  if (modal.calMonth > 11) { modal.calMonth = 0; modal.calYear++; }
  if (modal.calMonth < 0) { modal.calMonth = 11; modal.calYear--; }
  render();
}
function calClear() { modal.dateFrom = null; modal.dateTo = null; render(); }

window.edit_pickDate = calPickDate;
window.edit_calNav = calNav;
window.edit_clearDate = calClear;
window.add_pickDate = calPickDate;
window.add_calNav = calNav;
window.add_clearDate = calClear;

window.editChangePhase = phaseId => {
  modal.movePhase = phaseId;
  const ph = phases.find(p=>p.id===phaseId);
  modal.moveWeek = ph?.weeks[0]?.id || modal.moveWeek;
  render();
};

window.setPhase = id => { activePhase=id; render(); };
document.getElementById('app').addEventListener('click', e => {
  const el = e.target.closest('[data-toggle]');
  if (el) toggle(el.dataset.toggle);
});
window.toggleNote = id => { expandedNote = expandedNote===id?null:id; expandedStrat=null; render(); };
window.toggleStrat = id => { expandedStrat = expandedStrat===id?null:id; expandedNote=null; render(); };
window.closeModal = () => { modal=null; render(); };

window.openEdit = (phaseId, weekId, taskId) => {
  const ph = phases.find(p=>p.id===phaseId);
  const wk = ph?.weeks.find(w=>w.id===weekId);
  const task = wk?.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const now = new Date();
  const df = task.dateFrom || null;
  const dt = task.dateTo || null;
  modal = {
    type:'edit', phaseId, weekId, taskId, text:task.text, note:task.note||'',
    dateFrom:df, dateTo:dt,
    calMonth: df ? new Date(df+'T12:00:00').getMonth() : now.getMonth(),
    calYear: df ? new Date(df+'T12:00:00').getFullYear() : now.getFullYear(),
    strat:task.strategy||'required', stratNote:task.strategyNote||'',
    priority:task.priority||'medium', movePhase:phaseId, moveWeek:weekId
  };
  expandedNote=null; expandedStrat=null;
  render();
};

window.openAdd = (phaseId, weekId) => {
  const now = new Date();
  modal = { type:'add', phaseId, weekId, strat:'required', priority:'medium',
    dateFrom:null, dateTo:null, calMonth:now.getMonth(), calYear:now.getFullYear() };
  render();
};

window.doSave = () => {
  const text = document.getElementById('edit-text')?.value?.trim();
  if(!text) return;
  const toWeekEl = document.getElementById('edit-toWeek');
  const toWeekId = toWeekEl?.value || modal.weekId;
  updateTask(modal.phaseId, modal.weekId, modal.taskId, {
    text, note: document.getElementById('edit-note')?.value||'',
    dateFrom: modal.dateFrom||null, dateTo: modal.dateTo||null,
    date: fmtDate(modal.dateFrom, modal.dateTo),
    strategy: modal.strat, strategyNote: document.getElementById('edit-stratNote')?.value||'',
    priority: modal.priority
  });
};

window.doDelete = () => { if(confirm('Удалить задачу?')) deleteTask(modal.phaseId, modal.weekId, modal.taskId); };

window.doMove = () => {
  const text = document.getElementById('edit-text')?.value?.trim()||modal.text;
  const toWeekEl = document.getElementById('edit-toWeek');
  const toWeekId = toWeekEl?.value || modal.moveWeek;
  moveTask(modal.phaseId, modal.weekId, modal.taskId, modal.movePhase, toWeekId, {
    text, note: document.getElementById('edit-note')?.value||'',
    date: document.getElementById('edit-date')?.value||'',
    strategy: modal.strat, strategyNote: document.getElementById('edit-stratNote')?.value||'',
    priority: modal.priority
  });
};

window.doAdd = () => {
  const text = document.getElementById('add-text')?.value?.trim();
  if(!text) return;
  addTask(modal.phaseId, modal.weekId, {
    text, note: document.getElementById('add-note')?.value||'',
    dateFrom: modal.dateFrom||null, dateTo: modal.dateTo||null,
    date: fmtDate(modal.dateFrom, modal.dateTo),
    strategy: modal.strat, strategyNote:'', priority: modal.priority
  });
};

// Drag
window.dragStart = dragStart;
window.dragOver = dragOver;
window.dragDrop = dragDrop;

// Init
async function init() {
  try {
    const row = await dbLoad();
    if (row && row.phases) { phases = row.phases; checked = row.checked||{}; lastHash = JSON.stringify({phases, checked}); }
  } catch(e) {}
  dbStatus = "synced";
  render();
  setInterval(poll, 5000);
}

init();
</script>
</body>
</html>
